name: Monitor production MySQL backups

on:
  schedule:
    - cron: "15 20 * * *"
  workflow_dispatch:

concurrency:
  group: production-mysql-backup-monitor
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production-monitor
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_MONITOR_ROLE_ARN: ${{ vars.AWS_MONITOR_ROLE_ARN }}
      INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
    steps:
      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ env.AWS_MONITOR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-mysql-backup-monitor-${{ github.run_id }}

      - name: Inspect node state
        id: instance
        shell: bash
        run: |
          set -euo pipefail
          [[ "$INSTANCE_ID" =~ ^i-[a-f0-9]{8,17}$ ]] || { echo "EC2_INSTANCE_ID is missing or invalid" >&2; exit 1; }
          state="$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" --query 'Reservations[0].Instances[0].State.Name' --output text)"
          [[ "$state" =~ ^(running|stopped|stopping)$ ]] || { echo "Unexpected EC2 state: $state" >&2; exit 1; }
          printf 'state=%s\n' "$state" >> "$GITHUB_OUTPUT"
          if [[ "$state" != "running" ]]; then
            echo "The portfolio node is $state; Persistent=true will run missed timers after the next start." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Verify recent backup and restore drill
        if: steps.instance.outputs.state == 'running'
        shell: bash
        run: |
          set -euo pipefail
          parameters_file="$(mktemp)"
          trap 'rm -f -- "$parameters_file"' EXIT
          # Expanded by AWS-RunShellScript on the node.
          # shellcheck disable=SC2016
          node_script='set -eu
          status_root=/var/lib/talk-with-neighbors/backup-status
          backup_status="$status_root/latest-backup.json"
          restore_status="$status_root/latest-restore-verification.json"
          monitor_started_at="$status_root/monitor-started-at"
          systemctl is-enabled --quiet talk-with-neighbors-mysql-backup.timer
          systemctl is-enabled --quiet talk-with-neighbors-mysql-restore-verify.timer
          test -f "$backup_status" && test ! -L "$backup_status"
          test -f "$monitor_started_at" && test ! -L "$monitor_started_at"
          test "$(stat -c "%u:%a" "$monitor_started_at")" = "0:600"
          backup_created="$(jq -er ".createdAt | fromdateiso8601" "$backup_status")"
          installed_at="$(cat "$monitor_started_at")"
          printf "%s\n" "$installed_at" | grep -Eq "^[0-9]{10}$"
          now="$(date +%s)"
          backup_age="$((now - backup_created))"
          install_age="$((now - installed_at))"
          test "$backup_age" -ge 0 && test "$backup_age" -le 129600
          test "$install_age" -ge 0
          echo "backup-age-seconds=$backup_age"
          echo "backup-manifest=$(jq -er ".manifestKey" "$backup_status")"
          if test -f "$restore_status" && test ! -L "$restore_status"; then
            restore_verified="$(jq -er ".verifiedAt | fromdateiso8601" "$restore_status")"
            restore_age="$((now - restore_verified))"
            test "$restore_age" -ge 0 && test "$restore_age" -le 691200
            echo "restore-age-seconds=$restore_age"
          elif test "$install_age" -le 691200; then
            echo "restore-verification=initial-eight-day-grace"
          else
            echo "No recent restore verification exists" >&2
            exit 1
          fi'
          jq -n --arg script "$node_script" '{commands:["set -eu",$script],executionTimeout:["300"]}' > "$parameters_file"
          command_id="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "file://${parameters_file}" \
            --timeout-seconds 60 \
            --comment "talk-with-neighbors backup monitor ${GITHUB_RUN_ID}" \
            --query 'Command.CommandId' \
            --output text)"
          [[ "$command_id" =~ ^[a-f0-9-]{36}$ ]] || { echo "SSM did not return a command id" >&2; exit 1; }
          for _ in {1..60}; do
            status="$(aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || true)"
            case "$status" in
              Success)
                output="$(aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text)"
                {
                  echo "### MySQL backup monitor succeeded"
                  echo '```text'
                  printf '%s\n' "$output"
                  echo '```'
                } >> "$GITHUB_STEP_SUMMARY"
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query '[StandardOutputContent,StandardErrorContent]' --output text || true
                echo "Backup monitor failed with SSM status $status" >&2
                exit 1
                ;;
              Pending|InProgress|Delayed|"") sleep 5 ;;
              *) echo "Unexpected SSM status: $status" >&2; exit 1 ;;
            esac
          done
          echo "Backup monitor exceeded five minutes" >&2
          exit 1
