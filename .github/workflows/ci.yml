name: Backend CI

on:
  pull_request:
  push:
    branches: [main, "codex/**", "agent/**"]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      mysql:
        image: mysql:8.4@sha256:c831a0f11348d402b43d77453e17d770be2eef356615a2823fe0f5a0d6c8b9af
        env:
          MYSQL_DATABASE: talk_with_neighbors
          MYSQL_USER: twn
          MYSQL_PASSWORD: ci-password
          MYSQL_ROOT_PASSWORD: ci-root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -utwn -pci-password --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
      redis:
        image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - run: chmod +x gradlew
      - name: Run unit tests, MySQL integration tests, and package
        env:
          MYSQL_IT_URL: jdbc:mysql://127.0.0.1:3306/talk_with_neighbors?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          MYSQL_IT_USERNAME: twn
          MYSQL_IT_PASSWORD: ci-password
        run: ./gradlew clean test mysqlIntegrationTest bootJar --no-daemon
      - name: Validate production compose
        env:
          MYSQL_PASSWORD: ci-password
          MYSQL_ROOT_PASSWORD: ci-root-password
          JWT_SECRET: ci-only-secret-that-is-long-enough-for-validation
          PUBLIC_ORIGIN: https://example.invalid
        run: docker compose -f compose.production.yml config --quiet
      - name: Validate reproducible local compose
        run: docker compose -f compose.local.yml config --quiet
      - name: Build production container
        run: docker build -t talk-with-neighbors-backend:ci .
      - name: Scan container for fixable high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: talk-with-neighbors-backend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Smoke-test container with MySQL and Redis
        shell: bash
        run: |
          set -euo pipefail
          trap 'docker rm -f talk-with-neighbors-backend-ci >/dev/null 2>&1 || true; rm -f /tmp/public-feed-ci.json /tmp/public-meetups-ci.json' EXIT
          docker run --detach --name talk-with-neighbors-backend-ci --network host \
            -e SPRING_PROFILES_ACTIVE=production \
            -e 'SPRING_DATASOURCE_URL=jdbc:mysql://127.0.0.1:3306/talk_with_neighbors?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC' \
            -e SPRING_DATASOURCE_USERNAME=twn \
            -e SPRING_DATASOURCE_PASSWORD=ci-password \
            -e SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=1 \
            -e SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5 \
            -e SPRING_DATA_REDIS_HOST=127.0.0.1 \
            -e SPRING_DATA_REDIS_PORT=6379 \
            -e APP_SESSION_COOKIE_SECURE=false \
            -e CORS_ALLOWED_ORIGINS=http://127.0.0.1:3000 \
            -e JAVA_OPTS='-Dfile.encoding=UTF-8 -Xms128m -Xmx512m -Duser.timezone=UTC' \
            talk-with-neighbors-backend:ci

          for _ in {1..90}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/actuator/health/readiness | grep --quiet '"status":"UP"'; then
              curl --fail --silent --show-error \
                'http://127.0.0.1:8080/api/auth/check-duplicates?email=ci%40example.invalid&username=ci-smoke' >/dev/null
              public_feed_status="$(curl --fail --silent --show-error \
                --output /tmp/public-feed-ci.json --write-out '%{http_code}' \
                'http://127.0.0.1:8080/api/public/feed?size=1')"
              [[ "$public_feed_status" == "200" ]] || { echo "Public feed returned HTTP $public_feed_status" >&2; exit 1; }
              public_meetups_status="$(curl --fail --silent --show-error \
                --output /tmp/public-meetups-ci.json --write-out '%{http_code}' \
                'http://127.0.0.1:8080/api/public/meetups?size=1')"
              [[ "$public_meetups_status" == "200" ]] || { echo "Public meetups returned HTTP $public_meetups_status" >&2; exit 1; }
              protected_write_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
                --request POST --header 'Content-Type: application/json' --data '{}' \
                'http://127.0.0.1:8080/api/feed')"
              [[ "$protected_write_status" == "401" ]] || { echo "Anonymous feed write returned HTTP $protected_write_status instead of 401" >&2; exit 1; }
              exit 0
            fi
            if [ "$(docker inspect --format '{{.State.Running}}' talk-with-neighbors-backend-ci)" != "true" ]; then
              docker logs talk-with-neighbors-backend-ci
              exit 1
            fi
            sleep 2
          done

          docker logs talk-with-neighbors-backend-ci
          exit 1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: backend-test-report
          path: build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 7
