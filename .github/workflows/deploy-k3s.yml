name: Deploy EC2 k3s production

on:
  workflow_run:
    workflows: ["Publish backend image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      backend_image:
        description: "Backend digest, ghcr.io/gituserkhs/talk_with_neighbors_back@sha256:..."
        required: true
        type: string
      frontend_image:
        description: "Frontend digest, ghcr.io/gituserkhs/talk_with_neighbors_front@sha256:..."
        required: true
        type: string
      public_origin:
        description: "Optional HTTPS DNS origin; blank uses https://talk-with-neighbors.duckdns.org; diagnose://k3s collects a redacted one-day diagnostic artifact"
        required: false
        type: string
      start_if_stopped:
        description: "Start the portfolio EC2 instance before deployment"
        required: true
        default: false
        type: boolean
      reinitialize_k3s_network:
        description: "One-time destructive k3s network reset; requires the exact instance-scoped confirmation"
        required: true
        default: false
        type: boolean
      reinitialize_confirmation:
        description: "Leave blank normally; reset requires REINITIALIZE_K3S_NETWORK:<instance>:pods=10.244.0.0/16:services=10.96.0.0/16:dns=10.96.0.10"
        required: false
        type: string

concurrency:
  group: ec2-k3s-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  diagnose:
    name: Collect redacted k3s diagnostics
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.public_origin == 'diagnose://k3s'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
    steps:
      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-k3s-diagnostics-${{ github.run_id }}

      - name: Collect diagnostics without printing application logs
        shell: bash
        run: |
          set -euo pipefail
          [[ "$INSTANCE_ID" =~ ^i-[a-f0-9]{8,17}$ ]] || { echo "EC2_INSTANCE_ID is missing or invalid" >&2; exit 1; }

          parameters_file="$(mktemp)"
          trap 'rm -f -- "$parameters_file"' EXIT
          # Expanded later by AWS-RunShellScript on the EC2 node, not on the runner.
          # shellcheck disable=SC2016
          diagnostic_script='set -eu
          namespace=talk-with-neighbors
          output=/tmp/twn-k3s-diagnostics.txt
          redacted=/tmp/twn-k3s-diagnostics-redacted.txt
          compact=/tmp/twn-k3s-diagnostics-compact.txt
          encoded=/tmp/twn-k3s-diagnostics.b64
          {
            date --iso-8601=seconds
            echo "=== migration journal metadata ==="
            for marker in \
              /var/lib/talk-with-neighbors/migrations/k3s-network-v1.in-progress.json \
              /var/lib/talk-with-neighbors/migrations/k3s-network-v1.done.json \
              /var/lib/talk-with-neighbors/migrations/mysql-restore-v1.pending.json \
              /var/lib/talk-with-neighbors/migrations/mysql-restore-v1.done.json; do
              marker_name="$(basename "$marker")"
              if [ ! -e "$marker" ] && [ ! -L "$marker" ]; then
                printf "%s absent\n" "$marker_name"
              elif [ -L "$marker" ]; then
                printf "%s unsafe-symlink\n" "$marker_name"
              elif [ -f "$marker" ]; then
                marker_phase="$(jq -r ".phase // \"n/a\"" "$marker" 2>/dev/null || echo invalid)"
                marker_release="$(jq -r ".release_id // \"n/a\"" "$marker" 2>/dev/null || echo invalid)"
                printf "%s owner=%s mode=%s phase=%s release=%s\n" \
                  "$marker_name" "$(stat -c "%u" "$marker")" "$(stat -c "%a" "$marker")" \
                  "$marker_phase" "$marker_release"
              else
                printf "%s unsafe-non-regular\n" "$marker_name"
              fi
            done
            echo "backup-directories:"
            for backup in /var/lib/talk-with-neighbors/backups/k3s-network-v1-*; do
              [ -e "$backup" ] || [ -L "$backup" ] || continue
              backup_name="$(basename "$backup")"
              if [ ! -d "$backup" ] || [ -L "$backup" ]; then
                printf "%s unsafe\n" "$backup_name"
                continue
              fi
              backup_owner="$(stat -c "%u" "$backup")"
              backup_mode="$(stat -c "%a" "$backup")"
              if [ -s "$backup/SHA256SUMS" ] && [ -s "$backup/mysql.sql.gz" ] \
                && [ -s "$backup/server.tar.gz" ] && [ -s "$backup/k3s-config.yaml" ]; then
                checksum_status=fail
                mysql_gzip_status=fail
                server_tar_status=fail
                (cd "$backup" && sha256sum --check --status SHA256SUMS) && checksum_status=ok
                gzip -t "$backup/mysql.sql.gz" && mysql_gzip_status=ok
                tar -tzf "$backup/server.tar.gz" >/dev/null && server_tar_status=ok
                printf "%s owner=%s mode=%s full-backup checksum=%s mysql-gzip=%s server-tar=%s\n" \
                  "$backup_name" "$backup_owner" "$backup_mode" "$checksum_status" \
                  "$mysql_gzip_status" "$server_tar_status"
              else
                printf "%s owner=%s mode=%s partial-backup\n" \
                  "$backup_name" "$backup_owner" "$backup_mode"
              fi
            done
            if flock -n /run/lock/talk-with-neighbors-deploy.lock -c true; then
              echo "deploy-lock=free"
            else
              echo "deploy-lock=busy"
            fi
            k3s kubectl get nodes -o wide
            k3s kubectl -n "$namespace" get pods,deployments,statefulsets,services,ingress -o wide
            pvc_json="$(k3s kubectl -n "$namespace" get persistentvolumeclaims -o json)"
            echo "pvc-total=$(printf "%s" "$pvc_json" | jq ".items | length")"
            echo "pvc-bound=$(printf "%s" "$pvc_json" | jq "[.items[] | select(.status.phase == \"Bound\")] | length")"
            storage_path=/var/lib/rancher/k3s/storage
            if [ -d "$storage_path" ] && [ ! -L "$storage_path" ] \
              && [ "$(readlink -e "$storage_path")" = "$storage_path" ]; then
              echo "storage-path=safe"
              echo "storage-directory-count=$(find "$storage_path" -mindepth 1 -maxdepth 1 -type d | wc -l)"
            else
              echo "storage-path=unsafe"
            fi
            k3s kubectl -n kube-system get pods,services -o wide
            k3s kubectl -n kube-system get jobs,helmcharts.helm.cattle.io -o wide
            echo "=== cluster CIDR and resolver routes ==="
            k3s kubectl get nodes \
              -o jsonpath="{range .items[*]}{.metadata.name}{\" podCIDR=\"}{.spec.podCIDR}{\"\\n\"}{end}"
            ip route get 10.42.0.2 || true
            ip -4 route show table all | tail -n 80
            cat /run/systemd/resolve/resolv.conf 2>/dev/null || true
            echo "=== Traefik installer diagnostics ==="
            k3s kubectl -n kube-system get helmchart.helm.cattle.io traefik \
              -o jsonpath="chart={.spec.chart}{\"\\n\"}{range .status.conditions[*]}{.type}{\"=\"}{.status}{\" reason=\"}{.reason}{\" message=\"}{.message}{\"\\n\"}{end}" \
              || true
            traefik_pod="$(k3s kubectl -n kube-system get pod \
              -l batch.kubernetes.io/job-name=helm-install-traefik \
              -o jsonpath="{.items[0].metadata.name}" 2>/dev/null || true)"
            if [ -n "$traefik_pod" ]; then
              k3s kubectl -n kube-system get pod "$traefik_pod" \
                -o jsonpath="reason={.status.containerStatuses[0].lastState.terminated.reason}{\" code=\"}{.status.containerStatuses[0].lastState.terminated.exitCode}{\" started=\"}{.status.containerStatuses[0].lastState.terminated.startedAt}{\" finished=\"}{.status.containerStatuses[0].lastState.terminated.finishedAt}{\"\\n\"}" \
                || true
              k3s kubectl -n kube-system logs "$traefik_pod" \
                --all-containers=true --tail=80 || true
              k3s kubectl -n kube-system logs "$traefik_pod" \
                --all-containers=true --previous --tail=80 || true
            fi
            k3s kubectl -n kube-system get events \
              --sort-by=.metadata.creationTimestamp | tail -n 60
            k3s kubectl -n "$namespace" get endpointslice \
              -l kubernetes.io/service-name=backend \
              -o jsonpath="{range .items[*].endpoints[*]}{.addresses}{\" ready=\"}{.conditions.ready}{\" serving=\"}{.conditions.serving}{\"\\n\"}{end}" \
              || true
            echo "=== actuator probes ==="
            for health_path in liveness readiness; do
              started_at="$(date +%s)"
              health_result=0
              health_output="$(k3s kubectl -n "$namespace" exec deployment/backend -- \
                wget --timeout=8 --tries=1 --content-on-error -qO- \
                "http://127.0.0.1:8080/actuator/health/$health_path" 2>&1)" \
                || health_result="$?"
              printf "actuator-%s=%s\n" "$health_path" "$health_output"
              echo "actuator-result path=$health_path rc=$health_result elapsed-seconds=$(($(date +%s) - started_at))"
            done
            echo "=== direct database and Redis checks ==="
            if k3s kubectl -n "$namespace" exec statefulset/mysql -- sh -ec '\''
              MYSQL_PWD="$MYSQL_PASSWORD" mysql -N -u twn talk_with_neighbors -e "SELECT 1" >/dev/null
            '\''; then
              echo "database-query=up"
              database_counts="$(k3s kubectl -n "$namespace" exec statefulset/mysql -- sh -ec '\''
                MYSQL_PWD="$MYSQL_PASSWORD" mysql -N -u twn talk_with_neighbors -e "
                  SELECT CONCAT(\"application-table-count=\", COUNT(*))
                    FROM information_schema.tables WHERE table_schema = DATABASE();
                  SELECT CONCAT(\"users-row-count=\", COUNT(*)) FROM users;
                  SELECT CONCAT(\"feed-posts-row-count=\", COUNT(*)) FROM feed_posts;
                  SELECT CONCAT(\"messages-row-count=\", COUNT(*)) FROM messages;
                "
              '\'' 2>/dev/null || echo "database-counts=unavailable")"
              printf "%s\n" "$database_counts"
            else
              echo "database-query=down"
            fi
            if k3s kubectl -n "$namespace" exec statefulset/redis -- \
              redis-cli --raw PING | grep -qx PONG; then
              echo "redis-query=up"
            else
              echo "redis-query=down"
            fi
            echo "=== pod IMDSv2 reachability ==="
            if k3s kubectl -n "$namespace" exec deployment/backend -- sh -ec '\''
              metadata_value="$(wget --timeout=4 --tries=1 -qO- --method=PUT \
                --header="X-aws-ec2-metadata-token-ttl-seconds: 60" \
                http://169.254.169.254/latest/api/token)"
              test -n "$metadata_value"
              wget --timeout=4 --tries=1 -qO /dev/null \
                --header="X-aws-ec2-metadata-token: $metadata_value" \
                http://169.254.169.254/latest/meta-data/iam/security-credentials/
            '\''; then
              echo "imds-v2=reachable"
            else
              echo "imds-v2=unreachable"
            fi
            echo "=== host instance-role S3 check ==="
            media_bucket="$(k3s kubectl -n "$namespace" get configmap runtime-config -o jsonpath="{.data.media-s3-bucket}")"
            media_region="$(k3s kubectl -n "$namespace" get configmap runtime-config -o jsonpath="{.data.media-s3-region}")"
            if printf "%s" "$media_bucket" | grep -Eq "^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$" \
              && aws s3api head-bucket --bucket "$media_bucket" >/dev/null 2>&1; then
              echo "s3-host-role=up"
            else
              echo "s3-host-role=down"
            fi
            s3_route_result=0
            k3s kubectl -n "$namespace" exec deployment/backend -- \
              wget --timeout=8 --tries=1 -q --spider \
              "https://${media_bucket}.s3.${media_region}.amazonaws.com/" \
              || s3_route_result="$?"
            echo "s3-pod-unsigned-route-rc=$s3_route_result"
            echo "=== pod DNS and HTTPS route diagnostics ==="
            k3s kubectl -n "$namespace" exec deployment/backend -- sh -ec '\''
              cat /etc/resolv.conf
              cat /proc/net/route
              echo "dns-host=$1"
              timeout 8 getent ahostsv4 "$1" || true
            '\'' sh \
              "${media_bucket}.s3.${media_region}.amazonaws.com" || true
            route_url="https://${media_bucket}.s3.${media_region}.amazonaws.com/"
            echo "https-route=$route_url"
            k3s kubectl -n "$namespace" exec deployment/backend -- \
              wget -4 --timeout=8 --tries=1 --server-response --spider \
              "$route_url" 2>&1 | tail -n 30 || true
            echo "=== node forwarding and masquerade rules ==="
            sysctl net.ipv4.ip_forward || true
            iptables-save -t nat -c 2>/dev/null \
              | grep -E "(FLANNEL|flannel|CNI|KUBE|MASQ|10\\.42)" \
              | tail -n 100 || true
            journalctl --unit k3s --no-pager --since "30 minutes ago" \
              | grep -Ei "(traefik|helm|flannel|iptables|network)" \
              | tail -n 100 || true
            echo "=== node listeners and resources ==="
            ss -lnt
            free -m
            df -h / /var/lib/rancher/k3s
            echo "=== node-local ingress probe ==="
            ingress_result=0
            ingress_output="$(wget --timeout=5 --tries=1 --server-response --spider \
              http://127.0.0.1/healthz 2>&1)" || ingress_result="$?"
            printf "%s\n" "$ingress_output" | tail -n 20
            echo "node-local-ingress-rc=$ingress_result"
          } >"$output" 2>&1
          sed -E \
            -e "/(authorization|cookie|password|secret|session([ _-]?id)?|token)/I c\\[REDACTED SENSITIVE LOG LINE]" \
            -e "s/[[:alnum:]._%+-]+@[[:alnum:].-]+\\.[[:alpha:]]{2,}/[REDACTED_EMAIL]/g" \
            -e "s/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/[REDACTED_UUID]/g" \
            -e "s/eyJ[A-Za-z0-9._-]+/[REDACTED_JWT]/g" \
            "$output" >"$redacted"
          gzip -9 -c "$redacted" | base64 -w0 >"$encoded"
          if [ "$(wc -c <"$encoded")" -gt 20000 ]; then
            {
              head -n 300 "$redacted"
              echo "[DIAGNOSTIC OUTPUT COMPACTED TO FIT SSM LIMIT]"
              tail -n 300 "$redacted"
            } >"$compact"
            gzip -9 -c "$compact" | base64 -w0 >"$encoded"
          fi
          cat "$encoded"
          shred -u -- "$output" "$redacted" "$compact" "$encoded" 2>/dev/null \
            || rm -f -- "$output" "$redacted" "$compact" "$encoded"'
          jq -n --arg script "$diagnostic_script" '{commands:[$script],executionTimeout:["180"]}' > "$parameters_file"

          command_id="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "file://${parameters_file}" \
            --timeout-seconds 60 \
            --comment "talk-with-neighbors on-demand diagnostics" \
            --query 'Command.CommandId' \
            --output text)"
          echo "SSM diagnostic command: $command_id"

          status=""
          for _ in {1..60}; do
            status="$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query Status \
              --output text 2>/dev/null || true)"
            case "$status" in
              Success|Failed|Cancelled|TimedOut) break ;;
              Pending|InProgress|Delayed|"") sleep 5 ;;
              *) echo "Unexpected SSM status: $status" >&2; exit 1 ;;
            esac
          done
          [[ "$status" == "Success" ]] || { echo "Diagnostic SSM command ended with $status" >&2; exit 1; }

          encoded="$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent \
            --output text)"
          [[ -n "$encoded" && "$encoded" != "None" ]] || { echo "Diagnostic output is empty" >&2; exit 1; }
          printf '%s' "$encoded" | base64 -d | gzip -d > "$RUNNER_TEMP/k3s-diagnostics.txt"

      - name: Upload redacted diagnostic artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: k3s-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/k3s-diagnostics.txt
          if-no-files-found: error
          retention-days: 1

      - name: Remove runner diagnostic file
        if: always()
        shell: bash
        run: shred -u -- "$RUNNER_TEMP/k3s-diagnostics.txt" 2>/dev/null || rm -f -- "$RUNNER_TEMP/k3s-diagnostics.txt"

  deploy:
    name: Deploy through AWS Systems Manager
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main' &&
       inputs.public_origin != 'diagnose://k3s')
    runs-on: ubuntu-latest
    # The current deploy role has a one-hour session. A guarded reset continues
    # independently in SSM (without cancellation) if this runner stops waiting.
    timeout-minutes: 58
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
      MEDIA_BUCKET: ${{ vars.MEDIA_BUCKET }}
      BACKEND_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_image || '' }}
      FRONTEND_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.frontend_image || '' }}
      PUBLIC_ORIGIN_INPUT: ${{ (github.event_name == 'workflow_dispatch' && inputs.public_origin) || vars.PUBLIC_ORIGIN || 'https://talk-with-neighbors.duckdns.org' }}
      ACME_EMAIL: ${{ vars.ACME_EMAIL }}
      START_IF_STOPPED: ${{ github.event_name == 'workflow_run' && 'true' || inputs.start_if_stopped }}
      REINITIALIZE_K3S_NETWORK: ${{ github.event_name == 'workflow_run' && 'false' || inputs.reinitialize_k3s_network }}
      REINITIALIZE_CONFIRMATION: ${{ github.event_name == 'workflow_dispatch' && inputs.reinitialize_confirmation || '' }}
      K3S_NETWORK_REINITIALIZE_ALLOWED: ${{ vars.K3S_NETWORK_REINITIALIZE_ALLOWED }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Buildx for immutable tag resolution
        if: github.event_name == 'workflow_run'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Resolve verified main tags to immutable digests
        if: github.event_name == 'workflow_run'
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -z "$GHCR_USERNAME" && -z "$GHCR_TOKEN" || -n "$GHCR_USERNAME" && -n "$GHCR_TOKEN" ]] || { echo "Set both GHCR credentials or neither" >&2; exit 1; }

          ghcr_logged_in=false
          cleanup_ghcr_login() {
            if [[ "$ghcr_logged_in" == "true" ]]; then
              docker logout ghcr.io >/dev/null 2>&1 || true
            fi
          }
          trap cleanup_ghcr_login EXIT
          if [[ -n "$GHCR_USERNAME" ]]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GHCR_USERNAME" --password-stdin >/dev/null
            ghcr_logged_in=true
          fi

          resolve_main_image() {
            local image="$1"
            local digest
            digest="$(docker buildx imagetools inspect "${image}:main" | awk '$1 == "Digest:" && digest == "" { digest = $2 } END { print digest }')"
            [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "Could not resolve a valid OCI digest for ${image}:main" >&2; exit 1; }
            printf '%s@%s' "$image" "$digest"
          }

          backend_image="$(resolve_main_image ghcr.io/gituserkhs/talk_with_neighbors_back)"
          frontend_image="$(resolve_main_image ghcr.io/gituserkhs/talk_with_neighbors_front)"
          {
            printf 'BACKEND_IMAGE=%s\n' "$backend_image"
            printf 'FRONTEND_IMAGE=%s\n' "$frontend_image"
          } >> "$GITHUB_ENV"
          echo "Resolved verified backend and frontend main tags to immutable OCI digests."

      - name: Validate deployment inputs
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$BACKEND_IMAGE" =~ ^ghcr\.io/gituserkhs/talk_with_neighbors_back@sha256:[a-f0-9]{64}$ ]] || { echo "Invalid backend digest" >&2; exit 1; }
          [[ "$FRONTEND_IMAGE" =~ ^ghcr\.io/gituserkhs/talk_with_neighbors_front@sha256:[a-f0-9]{64}$ ]] || { echo "Invalid frontend digest" >&2; exit 1; }
          [[ "$INSTANCE_ID" =~ ^i-[a-f0-9]{8,17}$ ]] || { echo "EC2_INSTANCE_ID is missing or invalid" >&2; exit 1; }
          [[ -n "$AWS_ROLE_ARN" && -n "$DEPLOY_BUCKET" && -n "$MEDIA_BUCKET" ]] || { echo "AWS role and S3 bucket variables are required" >&2; exit 1; }
          (( ${#MYSQL_PASSWORD} >= 16 )) || { echo "MYSQL_PASSWORD must contain at least 16 characters" >&2; exit 1; }
          (( ${#MYSQL_ROOT_PASSWORD} >= 16 )) || { echo "MYSQL_ROOT_PASSWORD must contain at least 16 characters" >&2; exit 1; }
          [[ -z "$GHCR_USERNAME" && -z "$GHCR_TOKEN" || -n "$GHCR_USERNAME" && -n "$GHCR_TOKEN" ]] || { echo "Set both GHCR credentials or neither" >&2; exit 1; }
          expected_confirmation="REINITIALIZE_K3S_NETWORK:${INSTANCE_ID}:pods=10.244.0.0/16:services=10.96.0.0/16:dns=10.96.0.10"
          if [[ "$REINITIALIZE_K3S_NETWORK" == "true" ]]; then
            [[ "$K3S_NETWORK_REINITIALIZE_ALLOWED" == "true" ]] || { echo "The production Environment must explicitly set K3S_NETWORK_REINITIALIZE_ALLOWED=true" >&2; exit 1; }
            [[ "$REINITIALIZE_CONFIRMATION" == "$expected_confirmation" ]] || { echo "The instance-scoped k3s network confirmation is invalid" >&2; exit 1; }
          else
            [[ "$REINITIALIZE_K3S_NETWORK" == "false" ]] || { echo "Invalid k3s reinitialize flag" >&2; exit 1; }
            [[ -z "$REINITIALIZE_CONFIRMATION" ]] || { echo "Clear the k3s network confirmation when reinitialization is disabled" >&2; exit 1; }
          fi

      - name: Configure short-lived AWS credentials
        id: aws
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-ec2-k3s-${{ github.run_id }}

      - name: Resolve and prepare the EC2 instance
        id: instance
        shell: bash
        run: |
          set -euo pipefail
          state="$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" --query 'Reservations[0].Instances[0].State.Name' --output text)"
          if [[ "$state" == "stopped" && "$START_IF_STOPPED" == "true" ]]; then
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" >/dev/null
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            state=running
          elif [[ "$state" == "pending" ]]; then
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            state=running
          fi
          [[ "$state" == "running" ]] || { echo "EC2 is $state. Start it or select start_if_stopped." >&2; exit 1; }

          public_ip="$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)"
          [[ "$public_ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "EC2 has no public IPv4 address" >&2; exit 1; }
          elastic_ip="$(aws ec2 describe-addresses --filters "Name=instance-id,Values=$INSTANCE_ID" --query 'Addresses[0].PublicIp' --output text)"
          [[ "$elastic_ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ && "$elastic_ip" == "$public_ip" ]] || { echo "Apply Terraform so the instance has its declared Elastic IP before HTTPS deployment" >&2; exit 1; }
          public_origin="$PUBLIC_ORIGIN_INPUT"
          [[ "$public_origin" =~ ^https://([a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$ ]] || { echo "public_origin must be a lowercase HTTPS DNS origin without a port or path" >&2; exit 1; }
          public_host="${public_origin#https://}"

          dns_matches=false
          for _ in {1..30}; do
            resolved_ips="$(getent ahostsv4 "$public_host" 2>/dev/null | awk '{print $1}' | sort -u)"
            if [[ "$resolved_ips" == "$elastic_ip" ]]; then
              dns_matches=true
              break
            fi
            sleep 10
          done
          [[ "$dns_matches" == "true" ]] || { echo "Update the ${public_host} A record to Elastic IP ${elastic_ip} and wait for propagation" >&2; exit 1; }

          for _ in {1..60}; do
            ping_status="$(aws ssm describe-instance-information --filters "Key=InstanceIds,Values=$INSTANCE_ID" --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || true)"
            [[ "$ping_status" == "Online" ]] && break
            sleep 5
          done
          [[ "${ping_status:-}" == "Online" ]] || { echo "SSM agent did not become online within five minutes" >&2; exit 1; }
          echo "public_origin=$public_origin" >> "$GITHUB_OUTPUT"
          echo "public_host=$public_host" >> "$GITHUB_OUTPUT"

      - name: Build the private deployment bundle
        env:
          PUBLIC_ORIGIN: ${{ steps.instance.outputs.public_origin }}
          ACME_EMAIL: ${{ env.ACME_EMAIL }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        shell: bash
        run: bash deploy/k8s/build-bundle.sh "$RUNNER_TEMP/deploy-bundle.tgz"

      - name: Deploy through S3 and SSM
        shell: bash
        run: |
          bash deploy/k8s/deploy-via-ssm.sh \
            "$INSTANCE_ID" \
            "$DEPLOY_BUCKET" \
            "deployments/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/bundle.tgz" \
            "$RUNNER_TEMP/deploy-bundle.tgz" \
            "$BACKEND_IMAGE" \
            "$FRONTEND_IMAGE" \
            "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            "$REINITIALIZE_K3S_NETWORK" \
            "$REINITIALIZE_CONFIRMATION"

      - name: Run strict public smoke tests
        env:
          PUBLIC_ORIGIN: ${{ steps.instance.outputs.public_origin }}
          PUBLIC_HOST: ${{ steps.instance.outputs.public_host }}
        shell: bash
        run: |
          set -euo pipefail
          read -r redirect_status redirect_url < <(curl --show-error --silent --output /dev/null --max-redirs 0 --write-out '%{http_code} %{redirect_url}' "http://${PUBLIC_HOST}/healthz")
          [[ "$redirect_status" == "301" || "$redirect_status" == "308" ]] || { echo "HTTP did not return a permanent HTTPS redirect" >&2; exit 1; }
          [[ "$redirect_url" == "$PUBLIC_ORIGIN/healthz" ]] || { echo "HTTP redirect target was not the canonical HTTPS origin" >&2; exit 1; }
          health_status="$(curl --fail --show-error --silent --retry 12 --retry-all-errors --retry-delay 5 --output "$RUNNER_TEMP/healthz.txt" --write-out '%{http_code}' "$PUBLIC_ORIGIN/healthz")"
          [[ "$health_status" == "200" ]] || { echo "healthz returned HTTP $health_status" >&2; exit 1; }
          [[ "$(tr -d '\r\n' < "$RUNNER_TEMP/healthz.txt")" == "ok" ]] || { echo "healthz returned an unexpected body" >&2; exit 1; }
          api_status="$(curl --fail --show-error --silent --retry 12 --retry-all-errors --retry-delay 5 --output "$RUNNER_TEMP/api-smoke.json" --write-out '%{http_code}' "$PUBLIC_ORIGIN/api/auth/check-duplicates?email=deploy-smoke%40example.invalid&username=deploy-smoke")"
          [[ "$api_status" == "200" ]] || { echo "API smoke test returned HTTP $api_status" >&2; exit 1; }
          jq -e 'type == "object" and ((.emailExists | type) == "boolean") and ((.usernameExists | type) == "boolean")' "$RUNNER_TEMP/api-smoke.json" >/dev/null
          public_feed_status="$(curl --fail --show-error --silent --retry 12 --retry-all-errors --retry-delay 5 --output "$RUNNER_TEMP/public-feed.json" --write-out '%{http_code}' "$PUBLIC_ORIGIN/api/public/feed?size=1")"
          [[ "$public_feed_status" == "200" ]] || { echo "Public feed returned HTTP $public_feed_status" >&2; exit 1; }
          jq -e 'type == "object" and (.content | type == "array") and (.content | length > 0) and (.content | all(.[]; (.demo | type) == "boolean"))' "$RUNNER_TEMP/public-feed.json" >/dev/null
          public_meetups_status="$(curl --fail --show-error --silent --retry 12 --retry-all-errors --retry-delay 5 --output "$RUNNER_TEMP/public-meetups.json" --write-out '%{http_code}' "$PUBLIC_ORIGIN/api/public/meetups?size=1")"
          [[ "$public_meetups_status" == "200" ]] || { echo "Public meetups returned HTTP $public_meetups_status" >&2; exit 1; }
          jq -e 'type == "object" and (.content | type == "array") and (.content | length > 0) and (.content | all(.[]; (.demo | type) == "boolean"))' "$RUNNER_TEMP/public-meetups.json" >/dev/null
          protected_write_status="$(curl --show-error --silent --output /dev/null --write-out '%{http_code}' --request POST --header 'Content-Type: application/json' --data '{}' "$PUBLIC_ORIGIN/api/feed")"
          [[ "$protected_write_status" == "401" ]] || { echo "Anonymous feed write returned HTTP $protected_write_status instead of 401" >&2; exit 1; }

      - name: Write deployment summary
        env:
          PUBLIC_ORIGIN: ${{ steps.instance.outputs.public_origin }}
        shell: bash
        run: |
          {
            echo "### EC2 k3s deployment succeeded"
            printf -- "- URL: <%s>\n" "$PUBLIC_ORIGIN"
            printf -- "- Backend: \`%s\`\n" "$BACKEND_IMAGE"
            printf -- "- Frontend: \`%s\`\n" "$FRONTEND_IMAGE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove runner plaintext files
        if: always()
        shell: bash
        run: |
          for path in "$RUNNER_TEMP/deploy-bundle.tgz" "$RUNNER_TEMP/healthz.txt" "$RUNNER_TEMP/api-smoke.json" "$RUNNER_TEMP/public-feed.json" "$RUNNER_TEMP/public-meetups.json"; do
            if [[ -f "$path" ]]; then
              shred -u -- "$path" 2>/dev/null || rm -f -- "$path"
            fi
          done
