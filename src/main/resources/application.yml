spring:
  application:
    name: talkWithNeighbors
  mandatory-file-encoding: UTF-8
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      adjust-dates-to-context-time-zone: false
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 125MB
      file-size-threshold: 2MB
  datasource:
    url: jdbc:mysql://localhost:3306/talk_with_neighbors?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&readOnlyPropagatesToServer=false&autoReconnect=true&defaultTransactionIsolation=READ_COMMITTED
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      auto-commit: false
      connection-test-query: SELECT 1
      minimum-idle: 10
      maximum-pool-size: 50
      transaction-isolation: TRANSACTION_READ_COMMITTED
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      data-source-properties:
        useServerPrepStmts: true
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQLDialect
        connection:
          provider_disables_autocommit: false
          autocommit: false
        jdbc:
          time_zone: UTC
          batch_size: 30
          batch_versioned_data: true
          order_inserts: true
          order_updates: true
    open-in-view: false
  session:
    store-type: redis
    redis:
      namespace: spring:session
      flush-mode: on-save
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 2000ms
      connect-timeout: 2000ms
      client-type: lettuce
      password:  # 비밀번호 설정 제거
    jpa:
      repositories:
        enabled: true
  config:
    import: optional:application-secret.yml

server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
  servlet:
    session:
      cookie:
        name: SESSIONID
        http-only: true
        secure: ${APP_SESSION_COOKIE_SECURE:false}
        same-site: lax
        path: /
        max-age: 86400
    encoding:
      charset: UTF-8
      force-request: true
      force-response: false
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
        add-additional-paths: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis,diskSpace
        storage:
          include: mediaStorage

cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    com.talkwithneighbors: DEBUG
    ROOT: WARN  # 다른 로그 노이즈 줄이기

app:
  auth:
    oauth:
      public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
      frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
      google:
        client-id: ${APP_AUTH_OAUTH_GOOGLE_CLIENT_ID:}
        client-secret: ${APP_AUTH_OAUTH_GOOGLE_CLIENT_SECRET:}
      kakao:
        client-id: ${APP_AUTH_OAUTH_KAKAO_CLIENT_ID:}
        client-secret: ${APP_AUTH_OAUTH_KAKAO_CLIENT_SECRET:}
    email:
      enabled: ${APP_AUTH_EMAIL_ENABLED:false}
      required: ${APP_AUTH_EMAIL_REQUIRED:false}
      sender: ${APP_AUTH_EMAIL_SENDER:disabled}
      hmac-secret: ${APP_AUTH_EMAIL_HMAC_SECRET:}
      from: ${APP_AUTH_EMAIL_FROM:}
      ses-region: ${APP_AUTH_EMAIL_SES_REGION:ap-northeast-2}
      code-ttl: ${APP_AUTH_EMAIL_CODE_TTL:PT10M}
      proof-ttl: ${APP_AUTH_EMAIL_PROOF_TTL:PT10M}
      resend-cooldown: ${APP_AUTH_EMAIL_RESEND_COOLDOWN:PT1M}
      max-attempts: ${APP_AUTH_EMAIL_MAX_ATTEMPTS:5}
      proof-cookie-name: TWN_EMAIL_PROOF
      proof-cookie-secure: ${APP_AUTH_EMAIL_PROOF_COOKIE_SECURE:true}
      request-limit-per-window: ${APP_AUTH_EMAIL_REQUEST_LIMIT:5}
      request-window: ${APP_AUTH_EMAIL_REQUEST_WINDOW:PT10M}
  official-content:
    enabled: ${APP_OFFICIAL_CONTENT_ENABLED:false}
  media:
    storage-type: ${APP_MEDIA_STORAGE_TYPE:local}
    storage-directory: ${APP_MEDIA_STORAGE_DIRECTORY:./uploads}
    s3:
      bucket: ${APP_MEDIA_S3_BUCKET:}
      region: ${APP_MEDIA_S3_REGION:ap-northeast-2}
      prefix: ${APP_MEDIA_S3_PREFIX:media}
    ffmpeg-command: ${APP_MEDIA_FFMPEG_COMMAND:ffmpeg}
    ffprobe-command: ${APP_MEDIA_FFPROBE_COMMAND:ffprobe}
    processing-timeout-seconds: ${APP_MEDIA_PROCESSING_TIMEOUT_SECONDS:90}
    max-concurrent-processes: ${APP_MEDIA_MAX_CONCURRENT_PROCESSES:1}
    max-video-bytes: ${APP_MEDIA_MAX_VIDEO_BYTES:31457280}
    max-video-duration-seconds: ${APP_MEDIA_MAX_VIDEO_DURATION_SECONDS:60}
    max-video-pixels: ${APP_MEDIA_MAX_VIDEO_PIXELS:2073600}
    max-video-dimension: ${APP_MEDIA_MAX_VIDEO_DIMENSION:1920}
  session:
    cookie-secure: ${APP_SESSION_COOKIE_SECURE:false}
  outbox:
    retry-interval-ms: 5000
    cleanup-cron: "0 0 3 * * *"
