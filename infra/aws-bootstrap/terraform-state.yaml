AWSTemplateFormatVersion: "2010-09-09"
Description: Dedicated, retained S3 backend for the talk-with-neighbors Terraform state

Parameters:
  StateBucketName:
    Type: String
    Description: Globally unique S3 bucket name used only for Terraform state and lock files
    MinLength: 3
    MaxLength: 63
    AllowedPattern: "^[a-z0-9][a-z0-9.-]+[a-z0-9]$"

Resources:
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref StateBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: RetainStateHistory
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 365
            ExpiredObjectDeleteMarker: true
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: Project
          Value: talk-with-neighbors
        - Key: Environment
          Value: production
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: TerraformState

  TerraformStateBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Bucket: !Ref TerraformStateBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt TerraformStateBucket.Arn
              - !Sub "${TerraformStateBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

Outputs:
  StateBucketName:
    Description: Dedicated Terraform backend bucket
    Value: !Ref TerraformStateBucket
  StateKey:
    Description: Key used by the production backend.hcl
    Value: talk-with-neighbors/production/terraform.tfstate
