apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: talk-with-neighbors
type: Opaque
stringData:
  mysql-password: REPLACE_WITH_A_RANDOM_PASSWORD
  mysql-root-password: REPLACE_WITH_A_DIFFERENT_RANDOM_PASSWORD
  email-verification-hmac-secret: REPLACE_WITH_AT_LEAST_32_RANDOM_CHARACTERS
  email-verification-from: verified-sender@example.com
  google-oauth-client-id: ""
  google-oauth-client-secret: ""
  kakao-oauth-client-id: ""
  kakao-oauth-client-secret: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: talk-with-neighbors
type: kubernetes.io/dockerconfigjson
data:
  # `echo -n '{"auths":{}}' | base64` works for public GHCR packages.
  .dockerconfigjson: eyJhdXRocyI6e319
